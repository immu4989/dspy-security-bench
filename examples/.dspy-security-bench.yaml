# Example dspy-security-bench scan config.
# Copy to your repo root as `.dspy-security-bench.yaml` and edit.
#
# Run locally:   dspy-security-bench scan --config .dspy-security-bench.yaml
# In CI:         see docs/ci.md

agent:
  # Test a model directly with the built-in function-calling agent:
  model: openai/gpt-4o-mini
  # ...or point at your own agent factory (a "module:callable" returning an
  # object satisfying dspy_security_bench.agents.Agent):
  # import: mypackage.agents:build_agent

scan:
  suites: [workspace]                       # AgentDojo suites to run
  attacks: [direct, important_instructions] # the attack set
  defenses: [none]                          # test the agent as deployed
  user_tasks: 5                             # sample size per suite (int or "all")
  injection_tasks: 1

gate:
  # absolute: fail if any cell's injection-security is below min_security.
  mode: absolute
  min_security: 0.90

  # regression: fail if security drops more than max_regression below a
  # committed baseline. Generate the baseline on your main branch with:
  #   dspy-security-bench scan --config .dspy-security-bench.yaml \
  #       --write-baseline .dsb-baseline.json
  # then switch to:
  # mode: regression
  # baseline: .dsb-baseline.json
  # max_regression: 0.10

report:
  formats: [terminal, sarif]
  sarif_out: dsb.sarif

fail_on: error   # error | warning | never
