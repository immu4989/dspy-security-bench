# Leaderboard model registry.
#
# Each entry is one model to measure under leaderboard/protocol.yaml. `model_id`
# MUST be a pinned version string (never a "-latest" alias) so a row means one
# thing forever. To propose a model, open an "Add model" issue; the maintainer
# runs the frozen runner and commits the result.
#
# `provider_env` names the env var that must hold the API key (never commit keys).

models:
  - model_id: openai/gpt-4o-mini-2024-07-18
    family: OpenAI
    display_name: gpt-4o-mini
    provider_env: OPENAI_API_KEY

